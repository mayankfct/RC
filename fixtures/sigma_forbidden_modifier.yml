title: Encoded Base64 Command Detection
id: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
status: experimental
description: Detects base64 encoded suspicious command fragments inside PowerShell process invocations. Uses base64offset to catch substring shifts. Should be rejected by the converter because EaglEye normalizes at the boundary.
references:
    - https://example.com/some-ref
author: Sigma Community
date: 2024-02-01
tags:
    - attack.defense-evasion
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|base64offset|contains:
            - 'Invoke-Mimikatz'
            - 'DownloadString'
    condition: selection
level: high
